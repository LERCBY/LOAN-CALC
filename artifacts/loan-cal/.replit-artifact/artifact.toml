kind = "web"
previewPath = "/"
title = "Loan CAL - Financial Calculator"
version = "1.0.0"
id = "artifacts/loan-cal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19018

[services.development]
run = "pnpm --filter @workspace/loan-cal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loan-cal", "run", "build" ]
publicDir = "artifacts/loan-cal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19018"
BASE_PATH = "/"
